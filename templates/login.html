<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CondoAdmin | Login</title>
    <link rel="stylesheet" href="/static/styles.css">
    <script src="/static/lucide-subset.js" defer></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255,255,255,0.92); backdrop-filter: blur(12px); }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
        .fade-up { animation: fadeUp 0.4s ease-out; }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-900 via-indigo-950 to-slate-900 flex items-center justify-center p-4">

    <!-- Decorative orbs -->
    <div class="fixed top-20 left-20 w-72 h-72 bg-indigo-500/20 rounded-full blur-3xl"></div>
    <div class="fixed bottom-20 right-20 w-96 h-96 bg-purple-500/15 rounded-full blur-3xl"></div>

    <div class="glass w-full max-w-md rounded-2xl shadow-2xl p-8 border border-white/30 fade-up relative z-10">
        <div class="flex items-center justify-center mb-6">
            <div class="w-14 h-14 bg-gradient-to-br from-indigo-600 to-indigo-700 rounded-2xl flex items-center justify-center text-white shadow-lg shadow-indigo-500/30">
                <i data-lucide="building-2" class="w-7 h-7"></i>
            </div>
        </div>
        <h2 class="text-2xl font-bold text-center text-slate-800 mb-1">CondoAdmin</h2>
        <p class="text-slate-500 text-center mb-8 text-sm">Sistema de Gestão de Arrecadações</p>

        {% if erro %}
        <div class="mb-5 bg-red-50 border-l-4 border-red-500 p-3 rounded-r-lg">
            <p class="text-sm text-red-700 font-medium">{{ erro }}</p>
        </div>
        {% endif %}

        <form action="/login" method="POST" class="space-y-5">
            <div>
                <label for="email" class="block text-sm font-medium text-slate-700 mb-1">E-mail</label>
                <input id="email" name="email" type="email" required placeholder="seu@email.com"
                       class="w-full px-4 py-2.5 border border-slate-300 rounded-xl text-sm text-slate-800 placeholder-slate-400
                              focus:outline-none focus:ring-2 focus:ring-indigo-500/40 focus:border-indigo-500 transition-all">
            </div>
            <div>
                <label for="senha" class="block text-sm font-medium text-slate-700 mb-1">Senha</label>
                <input id="senha" name="senha" type="password" required placeholder="••••••••"
                       class="w-full px-4 py-2.5 border border-slate-300 rounded-xl text-sm text-slate-800 placeholder-slate-400
                              focus:outline-none focus:ring-2 focus:ring-indigo-500/40 focus:border-indigo-500 transition-all">
            </div>
            <button type="submit"
                    class="w-full py-2.5 bg-gradient-to-r from-indigo-600 to-indigo-700 text-white rounded-xl text-sm font-semibold
                           shadow-lg shadow-indigo-500/25 hover:shadow-indigo-500/40 hover:from-indigo-700 hover:to-indigo-800
                           focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-all">
                Entrar
            </button>
        </form>

        <p class="mt-6 text-center text-xs text-slate-400">CondoAdmin &copy; 2026 — Departamento de Gestão</p>
    </div>

    <!-- lucide-subset.js auto-inits on DOMContentLoaded -->
</body>
</html>
